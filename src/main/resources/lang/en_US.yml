# AstrbotAdapter English Language File

# Plugin messages
plugin:
  enabled: "&a[AstrbotAdapter] Plugin enabled"
  disabled: "&c[AstrbotAdapter] Plugin disabled"
  disabling: "&e[AstrbotAdapter] Shutting down plugin..."

# Command messages
command:
  no-permission: "&cYou don't have permission to execute this command"
  unknown: "&cUnknown command: {0}"
  reload:
    reloading: "&eReloading configuration..."
    success: "&aConfiguration reloaded successfully"
    failed: "&cFailed to reload configuration: {0}"
  status:
    header: "&6=== AstrbotAdapter Status ==="
    websocket: "&eWebSocket: {0}"
    rest-api: "&eREST API: {0}"
    running: "&aRunning"
    stopped: "&cStopped"
    disabled: "&7Disabled"
  token:
    current: "&6Current token: &f{0}"
    regenerated: "&aNew token generated: &f{0}"
    warning: "&7Keep this token safe and don't share it with others"
  connections:
    header: "&6=== Active Connections ({0}) ==="
    none: "&eNo active connections"
    entry: "&e{0} &7- {1} &7- Last activity: {2}s ago"
    authenticated: "&aAuthenticated"
    unauthenticated: "&cUnauthenticated"

# Chat messages
chat:
  waiting: "&7Thinking..."
  response: "&7[&bAI&7] &f{0}"
  error: "&cSorry, an error occurred while processing your request"
  timeout: "&cRequest timed out, please try again later"
  no-permission: "&cYou don't have permission to use AI chat"

# Message forwarding
forward:
  from-external: "&7[&aExternal&7] &b{0}&7: &f{1}"
  to-external: "[{0}] {1}"
  blocked: "&cThis message has been filtered"

# Notification messages
notify:
  player-join: "Player {0} joined the server"
  player-quit: "Player {0} left the server"

# Error messages
error:
  config-load: "&cFailed to load configuration: {0}"
  config-save: "&cFailed to save configuration: {0}"
  websocket-start: "&cFailed to start WebSocket server: {0}"
  rest-start: "&cFailed to start REST API server: {0}"
  auth-failed: "Authentication failed"
  invalid-token: "Invalid token"
  rate-limited: "Too many requests, please try again later"
  server-error: "Internal server error"

# API response messages
api:
  success: "Operation successful"
  unauthorized: "Unauthorized access"
  forbidden: "Access forbidden"
  not-found: "Resource not found"
  bad-request: "Bad request format"
  internal-error: "Internal server error"
  command:
    executed: "Command executed"
    blocked: "This command is not allowed"
    failed: "Command execution failed"
