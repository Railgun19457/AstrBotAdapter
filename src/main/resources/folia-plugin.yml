name: AstrbotAdapter
version: '${project.version}'
main: io.github.railgun19457.astrbotadapter.AstrbotAdapterFolia
api-version: '1.20'
folia-supported: true
description: Astrbot 框架的 Minecraft 服务器适配器 (Folia版本)
authors:
  - Railgun19457
website: https://github.com/Railgun19457/AstrbotAdapter
softdepend:
  - PlaceholderAPI

commands:
  astrbot:
    description: AstrbotAdapter 主命令
    usage: /<command> [help|reload|status|token|connections]
    permission: astrbot.use
    aliases:
      - abot
      - astra

permissions:
  astrbot.use:
    description: 允许使用基础命令
    default: true
  astrbot.reload:
    description: 允许重载配置
    default: op
  astrbot.status:
    description: 允许查看插件状态
    default: op
  astrbot.token:
    description: 允许管理认证令牌
    default: op
  astrbot.connections:
    description: 允许查看活动连接
    default: op
  astrbot.chat:
    description: 允许使用 AI 聊天
    default: true
  astrbot.admin:
    description: 管理员权限，包含所有权限
    default: op
    children:
      astrbot.use: true
      astrbot.reload: true
      astrbot.status: true
      astrbot.token: true
      astrbot.connections: true
      astrbot.chat: true
