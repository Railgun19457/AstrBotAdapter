# ===========================================
# AstrbotAdaptor 配置文件 (Velocity代理端)
# 插件版本: 2.0.3
# ===========================================

# 插件基础设置
general:
  # 插件语言 (zh_CN / en_US)
  language: zh_CN
  
  # 调试模式（开启后输出详细日志）
  debug: false

# ===========================================
# 认证设置
# ===========================================
auth:
  # 认证Token（首次启动自动生成，请勿泄露）
  # 此Token用于Astrbot连接本插件的WS/REST API
  # 留空将在启动时自动生成32位随机Token
  token: ""

# ===========================================
# 通信服务器设置
# Velocity代理端负责与Astrbot通信
# WebSocket路径: /ws
# REST API路径: /api/*
# ===========================================
server:
  # 监听地址（0.0.0.0表示所有网卡）
  host: "0.0.0.0"
  # 监听端口
  port: 8765
  
  # WebSocket配置
  websocket:
    # 是否启用WebSocket服务
    enabled: true
    # 心跳间隔（秒）
    heartbeatInterval: 30
    # 心跳超时（秒，超过此时间无心跳则断开连接）
    heartbeatTimeout: 90
    
  # REST API配置
  restapi:
    # 是否启用REST API服务
    enabled: true
    # 请求频率限制（次/分钟，0为不限制）
    rateLimit: 100

# ===========================================
# 消息转发设置
# 将Minecraft聊天消息转发到Astrbot连接的其他平台
# ===========================================
messageForward:
  # 是否启用消息转发功能
  enabled: true
  
  # 触发前缀（玩家消息以此开头才会转发）
  # 留空表示转发所有消息
  prefix: "*"
  
  # 是否移除前缀后转发（true: 转发内容不含前缀）
  stripPrefix: true
  
  # 外来消息在游戏内显示格式
  # 可用占位符:
  #   {platform}  - 消息来源平台（如QQ、Discord等）
  #   {username}  - 外部用户名
  #   {content}   - 消息内容
  incomingFormat: "§7[§b{platform}§7] §f{username}§7: §f{content}"

# ===========================================
# AI聊天设置
# 代理端统一管理AI聊天配置，认证成功后自动同步到后端服务器
# 后端服务器无需单独配置此项
# ===========================================
aiChat:
  # 群聊模式（所有玩家可见）
  group:
    # 是否启用群聊模式
    enabled: true
    # 触发前缀（玩家消息以此开头触发群聊AI）
    # 留空表示所有消息都触发（不推荐）
    prefix: "@"
    
  # 私聊模式（仅发送者可见）
  private:
    # 是否启用私聊模式
    enabled: true
    # 触发前缀
    # 留空表示所有消息都触发（不推荐）
    prefix: "#"
    # 私聊消息模拟格式（取消原始消息后模拟显示）
    # 可用占位符:
    #   {player}  - 玩家名称
    #   {message} - 玩家发送的消息内容
    echoFormat: "<{player}> {message}"
    
  # AI回复消息格式
  # 可用占位符:
  #   {content}  - AI回复内容
  responseFormat: "§7[§dAI§7] §f{content}"
  
  # AI思考中提示（发送请求后显示）
  thinkingMessage: "§7[§dAI§7] §e思考中..."
  
  # 是否显示思考中提示
  showThinking: true
  
  # 请求超时时间（秒）
  timeout: 60

# ===========================================
# 玩家通知设置
# 玩家进出服务器时通知Astrbot
# ===========================================
playerNotification:
  # 玩家加入通知
  join:
    # 是否启用
    enabled: true
    
  # 玩家离开通知
  quit:
    # 是否启用
    enabled: true

# ===========================================
# 外部指令执行设置
# 允许Astrbot远程执行服务器指令
# ===========================================
commandExecution:
  # 是否启用外部指令执行功能
  enabled: true
  
  # 过滤器类型
  # NONE      - 不过滤，允许所有指令
  # BLACKLIST - 黑名单模式，禁止列表中的指令
  # WHITELIST - 白名单模式，仅允许列表中的指令
  filterType: BLACKLIST
  
  # 指令列表（根据filterType决定是黑名单还是白名单）
  # 支持通配符: * 匹配任意字符
  commandList:
    - "op *"
    - "deop *"
    - "stop"
    - "reload"
    - "restart"
    - "ban *"
    - "ban-ip *"
    - "pardon *"
    - "pardon-ip *"
    - "whitelist *"

# ===========================================
# 日志查询设置
# ===========================================
logQuery:
  # 是否启用日志查询功能
  enabled: true
  
  # 最大返回行数限制
  maxLines: 1000
  
  # 日志文件路径（相对于服务器根目录）
  # 留空使用默认路径: logs/latest.log
  logFile: ""
